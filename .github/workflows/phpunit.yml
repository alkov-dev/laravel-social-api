name: CI - PHPUnit

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: github_actions
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    strategy:
      matrix:
        php: [8.4]
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: github_actions
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, xml, pdo_pgsql, pdo, tokenizer
          ini-values: memory_limit=2G

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Copy .env
        run: cp .env.example .env

      - name: Configure Postgres in .env
        run: |
          sed -i "s/DB_CONNECTION=.*/DB_CONNECTION=pgsql/" .env || true
          sed -i "s/DB_HOST=.*/DB_HOST=127.0.0.1/" .env || true
          sed -i "s/DB_PORT=.*/DB_PORT=5432/" .env || true
          sed -i "s/DB_DATABASE=.*/DB_DATABASE=github_actions/" .env || true
          sed -i "s/DB_USERNAME=.*/DB_USERNAME=postgres/" .env || true
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=postgres/" .env || true

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "Postgres is up"; break
            fi
            echo "Waiting for Postgres... ($i)"; sleep 1
          done

      - name: Generate APP_KEY
        run: php artisan key:generate --ansi

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
